<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saathi: Wabi-Sabi Brain v38.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --stone-bg: #f5f5f4;
        --stone-paper: #ffffff;
        --stone-clay: #e7e5e4;
        --ink: #1c1917;
        --ink-faint: #78716c;
        --accent: #44403c;
        --radius-m: 12px;
        --radius-l: 24px;
        --radius-p: 100px;
      }

      * { margin:0; padding:0; box-sizing: border-box; }
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: var(--stone-bg); 
        color: var(--ink); 
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: ""; position: absolute; inset: 0; 
        background: radial-gradient(circle at 80% 20%, #e7e5e4 0%, transparent 50%), radial-gradient(circle at 10% 80%, #e7e5e4 0%, transparent 50%);
        z-index: -1; opacity: 0.5; animation: pulse 15s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
      h1, h2, h3, .serif { font-family: 'Fraunces', serif; letter-spacing: -0.02em; }

      /* ── ATOMIC WABI-SABI SHELL ── */
      .wabi-shell { min-height: 100vh; display: flex; flex-direction: column; padding: 40px; }
      
      /* ── LANDING ── */
      .landing-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; max-width: 900px; margin: 40px auto; }
      .nav-brand { margin-bottom: 40px; display: flex; align-items: center; justify-content: center; gap: 16px; font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 800; color: var(--ink); width: 100%; }
      .hero-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); margin-bottom: 24px; font-weight: 800; }
      .hero-title { font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 600; line-height: 0.95; margin-bottom: 32px; }
      .hero-subtitle { font-size: 1.25rem; color: var(--ink-faint); margin-bottom: 48px; max-width: 650px; text-align: center; margin: 0 auto 48px; }
      
      .pill-btn {
        padding: 20px 48px; background: var(--ink); color: white; border-radius: var(--radius-p);
        font-weight: 800; border: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 0.95rem;
      }
      .pill-btn:hover { background: var(--accent); transform: translateY(-2px); }
      .pill-btn.secondary { background: none; color: var(--ink); border: 1px solid var(--stone-clay); }

      /* ── DASHBOARD ── */
      .dashboard-layout { display: flex; height: calc(100vh - 80px); gap: 24px; }
      .side-panel { width: 340px; background: var(--stone-paper); border-radius: var(--radius-l); padding: 40px; display: flex; flex-direction: column; gap: 32px; border: 1px solid var(--stone-clay); }
      .main-panel { flex: 1; background: var(--stone-paper); border-radius: var(--radius-l); border: 1px solid var(--stone-clay); display: flex; flex-direction: column; position: relative; }
      
      .chat-scroll { flex: 1; overflow-y: auto; padding: 60px; display: flex; flex-direction: column; gap: 40px; }
      .msg-row { display: flex; width: 100%; }
      .msg-row.user { justify-content: flex-end; }
      .msg-bubble { max-width: 70%; padding: 24px 32px; border-radius: var(--radius-l); font-size: 1.1rem; }
      .assistant .msg-bubble { background: var(--stone-bg); color: var(--ink); border-bottom-left-radius: 4px; }
      .user .msg-bubble { background: var(--ink); color: white; border-bottom-right-radius: 4px; }

      .composer-area { padding: 40px; border-top: 1px solid var(--stone-clay); display: flex; gap: 16px; align-items: center; }
      .wabi-input { flex: 1; background: var(--stone-bg); border: none; padding: 20px 32px; border-radius: var(--radius-p); font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s; }
      .wabi-input:focus { background: white; box-shadow: 0 0 0 4px var(--stone-clay); }

      /* ── CARDS ── */
      .wabi-card { background: white; padding: 32px; border-radius: var(--radius-l); border: 1px solid var(--stone-clay); transition: 0.3s; }
      .wabi-card:hover { transform: translateY(-4px); }

      /* ── UTILS ── */
      .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.7); }
      #google_translate_element { position: fixed; bottom: 32px; right: 32px; z-index: 9999; }
      .VIpgJd-ZviAd-lp5Vfd-aZ2wHe-wSR0S { display: none !important; }

      @media (max-width: 1024px) {
        .wabi-shell { padding: 12px; height: 100vh; overflow: hidden; }
        .dashboard-layout { height: 100%; gap: 0; flex-direction: column; }
        .side-panel { 
          position: fixed; top: 0; left: 0; width: 85%; height: 100%; 
          z-index: 2000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          border-radius: 0 24px 24px 0; border-right: 1px solid var(--stone-clay);
          box-shadow: 40px 0 80px rgba(0,0,0,0.1); display: flex !important;
        }
        .side-panel.active { transform: translateX(0); }
        .main-panel { height: 100%; border-radius: var(--radius-m); }
        .chat-scroll { padding: 80px 20px 20px; gap: 24px; }
        .msg-bubble { max-width: 85%; padding: 16px 20px; font-size: 1rem; }
        .composer-area { padding: 16px; gap: 8px; flex-wrap: wrap; }
        .wabi-input { padding: 14px 20px; font-size: 0.95rem; order: 1; min-width: 100%; }
        .pill-btn { padding: 12px 24px; font-size: 0.85rem; }
        .composer-area > div { order: 2; margin-right: 0 !important; }
        .composer-area > button { order: 3; width: 48px !important; height: 48px !important; }
        #google_translate_element { bottom: 10px; right: 10px; transform: scale(0.8); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,mr,kn,ta,te,bn,en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
